aid: honorlock
url: https://raw.githubusercontent.com/api-evangelist/honorlock/refs/heads/main/apis.yml
name: Honorlock
kind: company
description: Honorlock is an online exam proctoring and academic integrity platform
  for higher education and professional certification. Its primary integration path
  is LTI 1.3, installed natively into LMS platforms - Canvas, Blackboard, Moodle,
  D2L Brightspace, Open LMS, Docebo, and Intellum - plus publisher platforms such as
  Pearson, McGraw Hill, and ALEKS via LMS workflows. For assessment platforms that
  need to embed proctoring outside an LMS, Honorlock offers a partner developer
  toolkit ("APIs and Elements") documented at docs.honorlock.com - a REST API for
  provisioning users, courses, exams, authentication tokens, and exam sessions,
  plus a browser-based Elements/Integration SDK that drives the exam-taker
  experience (extension verification, session setup, begin/end session). The
  developer program is sales-gated (contact-sales onboarding); Honorlock does not
  publish a self-service API key flow, an OpenAPI description, or a public base URL.
