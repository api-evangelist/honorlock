apis:
- aid: honorlock:honorlock-authentication-api
  name: Honorlock Authentication API
  tags:
  - Authentication
  - Tokens
  - Integration
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.honorlock.com/api
  properties:
  - url: https://docs.honorlock.com/api
    type: Documentation
  - url: https://honorlock.com/custom-integrations/
    type: Documentation
  description: Generate the integration and user authentication tokens that authorize
    an assessment platform to provision and drive Honorlock proctoring on behalf of
    an institution. Endpoints are modeled from Honorlock's public "Enablement" and
    "Administrator Experience" integration documentation; exact HTTP paths and base
    URL are gated behind the partner developer program.
- aid: honorlock:honorlock-users-api
  name: Honorlock Users API
  tags:
  - Users
  - Provisioning
  - Roster
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.honorlock.com/api
  properties:
  - url: https://docs.honorlock.com/api
    type: Documentation
  - url: https://honorlock.com/custom-integrations/
    type: Documentation
  description: Create and list the users (students, instructors, administrators) that
    participate in proctored exams. Part of the API-driven enablement flow that
    mirrors what LTI 1.3 provisions automatically inside a native LMS install.
    Endpoints are modeled from public integration documentation.
- aid: honorlock:honorlock-courses-api
  name: Honorlock Courses API
  tags:
  - Courses
  - Provisioning
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.honorlock.com/api
  properties:
  - url: https://docs.honorlock.com/api
    type: Documentation
  - url: https://honorlock.com/custom-integrations/
    type: Documentation
  description: Create and manage the courses that group exams and enrolled users
    when an assessment platform integrates directly rather than through an LMS.
    Endpoints are modeled from Honorlock's public integration documentation.
- aid: honorlock:honorlock-exams-api
  name: Honorlock Exams API
  tags:
  - Exams
  - Assessments
  - Configuration
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.honorlock.com/api
  properties:
  - url: https://docs.honorlock.com/api
    type: Documentation
  - url: https://honorlock.com/custom-integrations/
    type: Documentation
  description: Create and configure proctored exams - the settings that determine
    which integrity controls (ID verification, browser guard, recording, room scan,
    live pop-in, Search and Destroy) apply to an assessment. Endpoints are modeled
    from Honorlock's public integration documentation.
- aid: honorlock:honorlock-exam-sessions-api
  name: Honorlock Exam Sessions API
  tags:
  - Sessions
  - Proctoring
  - Lifecycle
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.honorlock.com/exam-taker
  properties:
  - url: https://docs.honorlock.com/exam-taker
    type: Documentation
  - url: https://honorlock.com/custom-integrations/
    type: Documentation
  description: Drive the exam-taker lifecycle - set up a session, verify that the
    test taker has completed the authentication steps (Verify Authentication),
    begin the proctored attempt, and close it out (End Exam Session) when the exam
    is submitted. Endpoints are modeled from Honorlock's public "Exam Taker
    Experience" documentation.
- aid: honorlock:honorlock-elements-sdk
  name: Honorlock Elements & Integration SDK
  tags:
  - SDK
  - Elements
  - Browser
  - Exam Taker
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.honorlock.com/integration-sdk
  properties:
  - url: https://docs.honorlock.com/integration-sdk
    type: Documentation
  - url: https://honorlock.com/custom-integrations/
    type: Documentation
  description: Browser-side Integration SDK and Elements UI components that embed the
    Honorlock exam-taker experience into a custom assessment platform - browser
    extension verification, pre-exam authentication and room scan, and the in-exam
    proctoring surface. Client-side JavaScript toolkit rather than a server REST
    resource.
